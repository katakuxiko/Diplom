services:
  # PostgreSQL с поддержкой pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: diplom_postgres
    environment:
      POSTGRES_DB: pdf_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diplom_network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: diplom_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - diplom_network

  # MinIO Client для создания bucket
  minio-client:
    image: minio/mc:latest
    container_name: diplom_minio_client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 admin password123;
      mc mb minio/documents --ignore-existing;
      mc policy set public minio/documents;
      exit 0;
      "
    networks:
      - diplom_network

  # Go Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diplom_app
    environment:
      - PG_CONN=host=postgres port=5432 user=postgres password=123123 dbname=pdf_ai sslmode=disable
      - SERVER_ADDR=:8080
      - EMBED_MODEL=text-embedding-nomic-embed-text-v1.5
      - LLM_MODEL=liquid/lfm2-1.2b
      - LMSTUDIO_BASE_URL=http://localhost:1234/v1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - MINIO_BUCKET=documents
      - MINIO_USE_SSL=false
      - JWT_SECRET=sadadasdasd
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-client:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - diplom_network

volumes:
  postgres_data:
  minio_data:

networks:
  diplom_network:
    driver: bridge
